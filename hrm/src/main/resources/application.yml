---
server:
  port: ${SERVER_PORT:8081}
spring:
  config:
    activate:
      on-profile: dev

  # jackson:
  #   default-property-inclusion: non_null
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/hrm_db}
    username: ${DB_USERNAME:root}
